name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Login to Docker hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}

        - name: Build and push image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/moviematrix:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
        - name: SSH and update container
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.VPS_HOST }}
            username: ${{ secrets.VPS_USER }}
            key: ${{ secrets.VPS_KEY }}
            script: |
                docker pull ${{ secrets.DOCKERHUB_USERNAME }}/moviematrix:latest
                docker rm -f ${{ secrets.DOCKERHUB_USERNAME }}/moviematrix:latest || true
                docker run -d --name ${{ secrets.DOCKERHUB_USERNAME }}/moviematrix:latest -p 80:80 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/moviematrix:latest
